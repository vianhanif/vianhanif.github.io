title: "Alvian's Blog"
description: >-
  Stories about building tools, AI routing, and custom development environments.
baseurl: ""
url: "https://vianhanif.github.io"
permalink: pretty
markdown: kramdown

exclude:
  - posts/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - .gitignore

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

author: Alvian

highlighter: rouge
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: "default"
