theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Jakarta

title: "Alvian's Blog"
tagline: "Building tools, AI routing, and custom ADEs"
description: >-
  Stories about building tools, AI routing, and custom development environments.

url: "https://vianhanif.github.io"

github:
  username: vianhanif

twitter:
  username:

social:
  name: Alvian
  email: alvian524@gmail.com
  links:
    - https://github.com/vianhanif
    - https://linkedin.com/in/vianhanif

theme_mode: dark
avatar: /static/image.jpg
social_preview_image: /static/social_image.jpeg
toc: true

paginate: 10

baseurl: ""

# Keep LinkedIn posts excluded
exclude:
  - posts/
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
