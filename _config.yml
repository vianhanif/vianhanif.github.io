theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Jakarta

title: "vian's notes"
tagline: "Learning in public, one post at a time"
description: >-
  Stories about building tools and figuring things out [ps aux]

url: "https://vianhanif.link"

github:
  username: vianhanif

twitter:
  username:

social:
  name: Alvian
  email: alvian524@gmail.com
  links:
    - https://github.com/vianhanif
    - https://linkedin.com/in/vianhanif

# theme_mode: # keep empty to enable light/dark toggle; set to 'light' or 'dark' to lock
avatar: /static/image.jpg
social_preview_image: /static/social_image.jpeg
toc: true

paginate: 10

baseurl: ""

# Keep LinkedIn posts excluded
exclude:
  - posts/
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order
  drafted:
    output: true
    permalink: /drafted/:title/
  linkedin:
    output: true
    permalink: /linkedin/:title/
  medium:
    output: true
    permalink: /medium/:title/

future: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: _drafted
    values:
      layout: post
      comments: false
      toc: false
      sitemap: false
  - scope:
      path: _linkedin
    values:
      layout: page
      comments: false
      toc: false
      sitemap: false
  - scope:
      path: _medium
    values:
      layout: page
      comments: false
      toc: false
      sitemap: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
